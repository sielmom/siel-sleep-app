<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dear Siel</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>

body{
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
background:#f6f7fb;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

h1{
text-align:center;
}

.card{
background:white;
padding:16px;
margin-bottom:16px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

input, select, textarea{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#2f6fed;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
font-size:16px;
}

.record{
background:#fff;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h1>Dear Siel</h1>

<div class="card">
<h3>기록 입력</h3>

<label>날짜</label>
<input type="date" id="date">

<label>구간</label>
<select id="place">
<option>가정</option>
<option>학교</option>
<option>늘봄</option>
<option>센터</option>
<option>이동·대기·외부</option>
</select>

<label>텐트럼</label>
<input type="number" id="tantrum" value="0">

<label>턱 표현</label>
<input type="number" id="jaw" value="0">

<label>불안</label>
<input type="number" id="anxiety" value="0">

<label>수면시간</label>
<input type="number" id="sleep">

<label>복용약</label>
<select id="medicine">
<option>없음</option>
<option>리스페리돈</option>
<option>멜라토닌</option>
<option>아빌리파이</option>
</select>

<label>메모</label>
<textarea id="memo"></textarea>

<button onclick="saveRecord()">저장</button>

</div>

<div class="card">
<h3>오늘 기록</h3>
<div id="records"></div>
</div>

</div>

<script>

let records = JSON.parse(localStorage.getItem("records") || "[]");

function saveRecord(){

let data = {
date:document.getElementById("date").value,
place:document.getElementById("place").value,
tantrum:document.getElementById("tantrum").value,
jaw:document.getElementById("jaw").value,
anxiety:document.getElementById("anxiety").value,
sleep:document.getElementById("sleep").value,
medicine:document.getElementById("medicine").value,
memo:document.getElementById("memo").value
};

records.push(data);

localStorage.setItem("records",JSON.stringify(records));

render();

}

function render(){

let area=document.getElementById("records");
area.innerHTML="";

records.forEach((r,i)=>{

area.innerHTML+=`
<div class="record">
<b>${r.date}</b> | ${r.place}<br>
텐트럼:${r.tantrum} / 턱:${r.jaw} / 불안:${r.anxiety}<br>
수면:${r.sleep}시간<br>
약:${r.medicine}<br>
메모:${r.memo}
</div>
`;

});

}

render();

</script>

</body>
</html>
