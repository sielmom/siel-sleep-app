<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dear Siel</title>

  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">

  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --border:#e2e8f0;
      --accent:#2563eb;
      --accent-soft:#eff6ff;
      --danger:#dc2626;
      --danger-soft:#fef2f2;
      --ok:#059669;
      --ok-soft:#ecfdf5;
      --shadow:0 8px 24px rgba(15,23,42,0.06);
      --radius:18px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.55;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:20px 16px 60px;
    }

    .top-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:18px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:16px;
      padding:14px 16px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
    }

    .title{
      display:flex;
      align-items:center;
      gap:10px;
      margin:6px 0 8px;
      font-size:2rem;
      font-weight:800;
      line-height:1.1;
    }

    .title-icon{
      width:30px;
      height:30px;
      border-radius:8px;
      flex:0 0 auto;
    }

    .desc{
      color:var(--muted);
      font-size:1.05rem;
      margin-bottom:18px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .section-title{
      font-size:1.15rem;
      font-weight:800;
      margin:0 0 12px;
    }

    .subtle{
      color:var(--muted);
      font-size:0.95rem;
    }

    .grid{
      display:grid;
      gap:14px;
    }

    .grid.two{
      grid-template-columns:repeat(2, minmax(0,1fr));
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:12px;
    }

    .stat-card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
      box-shadow:var(--shadow);
    }

    .stat-label{
      font-size:0.95rem;
      color:var(--muted);
      margin-bottom:8px;
    }

    .stat-value{
      font-size:2rem;
      font-weight:800;
      line-height:1.1;
    }

    .field{
      margin-bottom:14px;
    }

    label{
      display:block;
      font-size:0.95rem;
      font-weight:700;
      margin-bottom:6px;
    }

    input, select, textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px 14px;
      font-size:16px;
      background:#fff;
      color:var(--text);
    }

    textarea{
      min-height:92px;
      resize:vertical;
    }

    .small-textarea{
      min-height:76px;
    }

    .inline-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:12px;
    }

    .radio-group, .event-group{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .radio-item, .event-item{
      display:flex;
      align-items:center;
      gap:6px;
      padding:8px 12px;
      border:1px solid var(--border);
      border-radius:999px;
      background:#fff;
      font-size:14px;
    }

    .record-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:10px;
    }

    .record-title{
      font-size:1.05rem;
      font-weight:800;
    }

    .badge-row{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:8px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:5px 10px;
      border-radius:999px;
      background:var(--accent-soft);
      color:var(--accent);
      font-size:13px;
      font-weight:700;
    }

    .mini{
      color:var(--muted);
      font-size:0.9rem;
      margin-top:8px;
    }

    .record-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px 14px;
      margin-top:14px;
      font-size:0.98rem;
    }

    .note{
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      background:#f8fafc;
      border:1px solid var(--border);
      white-space:pre-wrap;
    }

    .letter{
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      background:var(--accent-soft);
      border:1px solid #bfdbfe;
      white-space:pre-wrap;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .outline-btn, .danger-btn, .primary-btn{
      border:none;
      border-radius:12px;
      padding:11px 14px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
    }

    .outline-btn{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    .primary-btn{
      background:var(--accent);
      color:#fff;
    }

    .danger-btn{
      background:var(--danger-soft);
      color:var(--danger);
      border:1px solid #fecaca;
    }

    .status{
      margin-top:10px;
      padding:12px 14px;
      border-radius:14px;
      font-size:0.95rem;
      display:none;
    }

    .status.ok{
      display:block;
      background:var(--ok-soft);
      color:var(--ok);
      border:1px solid #a7f3d0;
    }

    .status.error{
      display:block;
      background:var(--danger-soft);
      color:var(--danger);
      border:1px solid #fecaca;
    }

    .divider{
      height:1px;
      background:var(--border);
      margin:22px 0;
    }

    .empty{
      padding:14px;
      border-radius:14px;
      background:#fff;
      border:1px dashed var(--border);
      color:var(--muted);
      font-size:0.95rem;
    }

    @media (max-width:700px){
      .grid.two,
      .stats,
      .inline-grid,
      .record-grid{
        grid-template-columns:1fr;
      }

      .title{
        font-size:1.85rem;
      }

      .top-actions{
        grid-template-columns:1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-actions">
      <button class="btn" onclick="window.print()">A4 출력 / PDF 저장</button>
      <button class="btn" onclick="downloadJson()">요약 파일 다운로드</button>
    </div>

    <h1 class="title">
      <img src="icon.png" class="title-icon" alt="Dear Siel 아이콘">
      Dear Siel
    </h1>

    <p class="desc">
      Dear Siel — 시엘을 이해하기 위한 사랑의 기록입니다.
      하루의 흐름을 가정, 학교, 늘봄, 센터, 이동·대기·외부 5개의 구간으로 기록하고
      부모가 함께 오늘의 내용을 이어서 완성해 갈 수 있도록 돕습니다.
    </p>

    <!-- 오늘 기록 -->
    <section class="card">
      <h2 class="section-title">오늘 기록</h2>
      <div id="todayRecordsBox"></div>
    </section>

    <!-- 입력/수정 -->
    <section class="card" id="formSection">
      <h2 class="section-title">입력 / 수정</h2>
      <div class="subtle" style="margin-bottom:12px;">
        오늘 같은 날짜 + 같은 구간 기록은 첫 저장이 기준이 됩니다.
        기존 기록을 바꾸려면 반드시 <strong>수정</strong> 버튼을 눌러 주세요.
      </div>

      <div class="inline-grid">
        <div class="field">
          <label for="date">날짜</label>
          <input id="date" type="date">
        </div>
        <div class="field">
          <label for="editorName">작성자 이름</label>
          <input id="editorName" type="text" placeholder="엄마 / 아빠">
        </div>
      </div>

      <div class="field">
        <label>작성자 구분</label>
        <div class="radio-group" id="roleBox"></div>
      </div>

      <div class="field">
        <label>기록 구간</label>
        <div class="radio-group" id="segmentBox"></div>
      </div>

      <div class="inline-grid">
        <div class="field">
          <label for="sleepNaitoMg">슬리나이토 (mg)</label>
          <input id="sleepNaitoMg" type="number" step="0.1" min="0">
        </div>
        <div class="field">
          <label for="risperidoneMg">리스페리돈 (mg)</label>
          <input id="risperidoneMg" type="number" step="0.1" min="0">
        </div>
      </div>

      <div class="inline-grid">
        <div class="field">
          <label for="abilifyMg">아빌리파이 (mg)</label>
          <input id="abilifyMg" type="number" step="0.1" min="0">
        </div>
        <div class="field">
          <label for="medChangeType">약 변화</label>
          <select id="medChangeType">
            <option value="">선택 안 함</option>
            <option value="유지">유지</option>
            <option value="증량">증량</option>
            <option value="감량">감량</option>
            <option value="추가">추가</option>
            <option value="중단">중단</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="medChangeNote">약 변화 메모</label>
        <textarea id="medChangeNote" class="small-textarea" placeholder="증량 이유, 반응, 상담 내용 등을 적어보세요"></textarea>
      </div>

      <div class="inline-grid">
        <div class="field">
          <label for="sleepTime">취침 시간</label>
          <input id="sleepTime" type="time">
        </div>
        <div class="field">
          <label for="finalWakeTime">최종 기상</label>
          <input id="finalWakeTime" type="time">
        </div>
      </div>

      <div class="inline-grid">
        <div class="field">
          <label for="wakeUps">중간 깸 횟수</label>
          <input id="wakeUps" type="number" min="0">
        </div>
        <div class="field">
          <label for="napMinutes">낮잠(분)</label>
          <input id="napMinutes" type="number" min="0">
        </div>
      </div>

      <div class="inline-grid">
        <div class="field">
          <label for="sleepyTime">졸린 시간</label>
          <input id="sleepyTime" type="time">
        </div>
        <div class="field">
          <label for="carAnxiety">차 이동 불안 (0~5)</label>
          <input id="carAnxiety" type="number" min="0" max="5">
        </div>
      </div>

      <div class="inline-grid">
        <div class="field">
          <label for="tantrumCount">텐트럼</label>
          <input id="tantrumCount" type="number" min="0">
        </div>
        <div class="field">
          <label for="chinCount">턱 행동</label>
          <input id="chinCount" type="number" min="0">
        </div>
      </div>

      <div class="inline-grid">
        <div class="field">
          <label for="aggressionCount">공격 행동</label>
          <input id="aggressionCount" type="number" min="0">
        </div>
        <div class="field">
          <label for="anxietyCount">불안 정도 (0~5)</label>
          <input id="anxietyCount" type="number" min="0" max="5">
        </div>
      </div>

      <div class="inline-grid">
        <div class="field">
          <label for="participation">참여도 (0~5)</label>
          <input id="participation" type="number" min="0" max="5">
        </div>
        <div class="field">
          <label for="mealAmount">식사량</label>
          <select id="mealAmount">
            <option value="적음">적음</option>
            <option value="보통" selected>보통</option>
            <option value="많음">많음</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>오늘 있었던 주요 사건</label>
        <div class="event-group" id="eventsBox"></div>
      </div>

      <div class="field">
        <label for="notes">메모</label>
        <textarea id="notes" placeholder="상황 설명, 선생님 피드백, 차 안에서 있었던 일 등을 적어보세요"></textarea>
      </div>

      <div class="field">
        <label for="dailyLetter">오늘 시엘에게 쓰는 한 줄 편지</label>
        <textarea id="dailyLetter" class="small-textarea" placeholder="오늘 시엘에게 전하고 싶은 한 문장을 적어보세요"></textarea>
      </div>

      <div class="actions">
        <button class="primary-btn" id="saveBtn">저장</button>
        <button class="outline-btn" type="button" onclick="resetForm()">새 입력으로 돌아가기</button>
      </div>

      <div id="saveStatus" class="status"></div>
    </section>

    <section class="card">
      <h2 class="section-title">전체 기록</h2>
      <div id="recordsBox"></div>
    </section>

    <section class="card">
      <h2 class="section-title">요약 보기</h2>
      <div class="stats" id="statsBox"></div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'dear_siel_entries_v2';

    const ROLE_OPTIONS = [
      { id:'mom', label:'엄마' },
      { id:'dad', label:'아빠' }
    ];

    const SEGMENT_OPTIONS = [
      { id:'home', label:'가정' },
      { id:'school', label:'학교' },
      { id:'after', label:'늘봄' },
      { id:'center', label:'센터' },
      { id:'transition', label:'이동·대기·외부' }
    ];

    const EVENT_OPTIONS = [
      '차 이동',
      '병원',
      '치료',
      '학교 피드백',
      '늘봄 피드백',
      '외출',
      '수면 흔들림',
      '식사 변화',
      '공격 행동',
      '불안 상승'
    ];

    let editingKey = null;

    const $ = (id) => document.getElementById(id);

    function roleLabel(role){
      const found = ROLE_OPTIONS.find(r => r.id === role);
      return found ? found.label : '';
    }

    function segmentLabel(segment){
      const found = SEGMENT_OPTIONS.find(s => s.id === segment);
      return found ? found.label : '';
    }

    function currentRole(){
      return document.querySelector('input[name="role"]:checked')?.value || 'mom';
    }

    function currentSegment(){
      return document.querySelector('input[name="segment"]:checked')?.value || 'home';
    }

    function makeEntryKey(entry){
      return `${entry.date}__${entry.segment}`;
    }

    function loadEntries(){
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }

    function saveEntries(entries){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function showStatus(message, isError = false){
      const box = $('saveStatus');
      box.textContent = message;
      box.className = 'status ' + (isError ? 'error' : 'ok');
    }

    function hideStatus(){
      $('saveStatus').style.display = 'none';
      $('saveStatus').className = 'status';
      $('saveStatus').textContent = '';
    }

    function initChoices(){
      $('roleBox').innerHTML = ROLE_OPTIONS.map((r, i) => `
        <label class="radio-item">
          <input type="radio" name="role" value="${r.id}" ${i === 0 ? 'checked' : ''}>
          ${r.label}
        </label>
      `).join('');

      $('segmentBox').innerHTML = SEGMENT_OPTIONS.map((s, i) => `
        <label class="radio-item">
          <input type="radio" name="segment" value="${s.id}" ${i === 0 ? 'checked' : ''}>
          ${s.label}
        </label>
      `).join('');

      $('eventsBox').innerHTML = EVENT_OPTIONS.map(e => `
        <label class="event-item">
          <input type="checkbox" value="${e}">
          ${e}
        </label>
      `).join('');
    }

    function getFormData(){
      return {
        date: $('date').value,
        editorName: $('editorName').value.trim(),
        role: currentRole(),
        segment: currentSegment(),
        sleepNaitoMg: $('sleepNaitoMg').value,
        risperidoneMg: $('risperidoneMg').value,
        abilifyMg: $('abilifyMg').value,
        medChangeType: $('medChangeType').value,
        medChangeNote: $('medChangeNote').value.trim(),
        sleepTime: $('sleepTime').value,
        wakeUps: $('wakeUps').value,
        finalWakeTime: $('finalWakeTime').value,
        napMinutes: $('napMinutes').value,
        sleepyTime: $('sleepyTime').value,
        carAnxiety: $('carAnxiety').value,
        tantrumCount: $('tantrumCount').value,
        chinCount: $('chinCount').value,
        aggressionCount: $('aggressionCount').value,
        anxietyCount: $('anxietyCount').value,
        participation: $('participation').value,
        mealAmount: $('mealAmount').value,
        notes: $('notes').value.trim(),
        dailyLetter: $('dailyLetter').value.trim(),
        events: Array.from(document.querySelectorAll('#eventsBox input:checked')).map(i => i.value)
      };
    }

    function loadEntryToForm(date, segment){
      const entries = loadEntries();
      const target = entries.find(e => e.date === date && e.segment === segment);
      if (!target) return;

      editingKey = makeEntryKey(target);

      $('date').value = target.date || '';
      $('editorName').value = target.editorName || roleLabel(target.role);
      $('sleepNaitoMg').value = target.sleepNaitoMg || '';
      $('risperidoneMg').value = target.risperidoneMg || '';
      $('abilifyMg').value = target.abilifyMg || '';
      $('medChangeType').value = target.medChangeType || '';
      $('medChangeNote').value = target.medChangeNote || '';
      $('sleepTime').value = target.sleepTime || '21:00';
      $('wakeUps').value = target.wakeUps || '';
      $('finalWakeTime').value = target.finalWakeTime || '06:30';
      $('napMinutes').value = target.napMinutes || '0';
      $('sleepyTime').value = target.sleepyTime || '15:00';
      $('carAnxiety').value = target.carAnxiety || '0';
      $('tantrumCount').value = target.tantrumCount || '0';
      $('chinCount').value = target.chinCount || '0';
      $('aggressionCount').value = target.aggressionCount || '0';
      $('anxietyCount').value = target.anxietyCount || '0';
      $('participation').value = target.participation || '';
      $('mealAmount').value = target.mealAmount || '보통';
      $('notes').value = target.notes || '';
      $('dailyLetter').value = target.dailyLetter || '';

      const roleInput = document.querySelector(`input[name="role"][value="${target.role}"]`);
      if (roleInput) roleInput.checked = true;

      const segmentInput = document.querySelector(`input[name="segment"][value="${target.segment}"]`);
      if (segmentInput) segmentInput.checked = true;

      document.querySelectorAll('#eventsBox input').forEach(input => {
        input.checked = (target.events || []).includes(input.value);
      });

      $('saveBtn').textContent = '수정 저장';
      showStatus('기존 기록을 불러왔습니다. 내용을 수정한 뒤 저장해 주세요.');
      document.getElementById('formSection').scrollIntoView({ behavior:'smooth', block:'start' });
    }

    function deleteEntry(date, segment){
      const next = loadEntries().filter(e => !(e.date === date && e.segment === segment));
      saveEntries(next);
      resetForm();
      render();
      showStatus('기록이 삭제되었습니다.');
    }

    function resetForm(){
      editingKey = null;
      $('saveBtn').textContent = '저장';

      $('date').value = new Date().toISOString().slice(0, 10);
      $('editorName').value = roleLabel(currentRole());
      $('sleepNaitoMg').value = '';
      $('risperidoneMg').value = '';
      $('abilifyMg').value = '';
      $('medChangeType').value = '';
      $('medChangeNote').value = '';
      $('sleepTime').value = '21:00';
      $('wakeUps').value = '';
      $('finalWakeTime').value = '06:30';
      $('napMinutes').value = '0';
      $('sleepyTime').value = '15:00';
      $('carAnxiety').value = '0';
      $('tantrumCount').value = '0';
      $('chinCount').value = '0';
      $('aggressionCount').value = '0';
      $('anxietyCount').value = '0';
      $('participation').value = '';
      $('mealAmount').value = '보통';
      $('notes').value = '';
      $('dailyLetter').value = '';
      document.querySelectorAll('#eventsBox input').forEach(input => input.checked = false);

      hideStatus();
    }

    function formatNum(v){
      const n = Number(v || 0);
      return Number.isFinite(n) ? n : 0;
    }

    function calcSleepHours(entry){
      if (!entry.sleepTime || !entry.finalWakeTime) return 0;
      const [sh, sm] = entry.sleepTime.split(':').map(Number);
      const [fh, fm] = entry.finalWakeTime.split(':').map(Number);

      let start = sh * 60 + sm;
      let end = fh * 60 + fm;

      if (end <= start) end += 24 * 60;

      const wakePenalty = formatNum(entry.wakeUps) * 15;
      const total = Math.max(0, end - start - wakePenalty + formatNum(entry.napMinutes));
      return total / 60;
    }

    function renderRecordCard(e){
      return `
        <div class="card">
          <div class="record-header">
            <div>
              <div class="record-title">${e.date} · ${segmentLabel(e.segment)}</div>
              <div class="badge-row">
                <span class="badge">${roleLabel(e.role)}</span>
                ${e.medChangeType ? `<span class="badge">약 ${e.medChangeType}</span>` : ''}
                ${e.events?.length ? e.events.map(ev => `<span class="badge">${ev}</span>`).join('') : ''}
              </div>
            </div>
          </div>

          <div class="mini">입력/수정: ${e.editorName || roleLabel(e.role)} · ${e.updatedAt || '-'}</div>

          <div class="record-grid">
            <div>수면 ${calcSleepHours(e).toFixed(1)}시간</div>
            <div>중간 깸 ${formatNum(e.wakeUps)}회</div>
            <div>텐트럼 ${formatNum(e.tantrumCount)}</div>
            <div>턱 행동 ${formatNum(e.chinCount)}</div>
            <div>공격 행동 ${formatNum(e.aggressionCount)}</div>
            <div>불안 ${formatNum(e.anxietyCount)}</div>
            <div>차 불안 ${formatNum(e.carAnxiety)}</div>
            <div>참여도 ${formatNum(e.participation)}</div>
            <div>식사 ${e.mealAmount || '-'}</div>
            <div>아빌리파이 ${e.abilifyMg || '-'}mg</div>
          </div>

          ${e.medChangeNote ? `<div class="note"><strong>약 변화 메모</strong><br>${e.medChangeNote}</div>` : ''}
          ${e.notes ? `<div class="note"><strong>메모</strong><br>${e.notes}</div>` : ''}
          ${e.dailyLetter ? `<div class="letter"><strong>오늘 시엘에게 쓰는 한 줄 편지</strong><br>${e.dailyLetter}</div>` : ''}

          <div class="actions">
            <button class="outline-btn" onclick="loadEntryToForm('${e.date}','${e.segment}')">수정</button>
            <button class="danger-btn" onclick="deleteEntry('${e.date}','${e.segment}')">삭제</button>
          </div>
        </div>
      `;
    }

    function renderTodayRecords(entries){
      const today = new Date().toISOString().slice(0, 10);
      const todayEntries = entries
        .filter(e => e.date === today)
        .sort((a,b) => SEGMENT_OPTIONS.findIndex(s => s.id === a.segment) - SEGMENT_OPTIONS.findIndex(s => s.id === b.segment));

      if (!todayEntries.length){
        $('todayRecordsBox').innerHTML = `
          <div class="empty">
            오늘 저장된 기록이 아직 없습니다.
            아래 입력 / 수정 영역에서 첫 기록을 남겨 주세요.
          </div>
        `;
        return;
      }

      $('todayRecordsBox').innerHTML = todayEntries.map(renderRecordCard).join('');
    }

    function renderAllRecords(entries){
      const sorted = [...entries].sort((a,b) => {
        const d = b.date.localeCompare(a.date);
        if (d !== 0) return d;
        return (b.updatedAt || '').localeCompare(a.updatedAt || '');
      });

      if (!sorted.length){
        $('recordsBox').innerHTML = `<div class="empty">아직 저장된 기록이 없습니다.</div>`;
        return;
      }

      $('recordsBox').innerHTML = sorted.map(renderRecordCard).join('');
    }

    function renderStats(entries){
      if (!entries.length){
        $('statsBox').innerHTML = `
          <div class="stat-card"><div class="stat-label">평균 수면</div><div class="stat-value">-</div></div>
          <div class="stat-card"><div class="stat-label">평균 텐트럼</div><div class="stat-value">-</div></div>
          <div class="stat-card"><div class="stat-label">평균 턱 행동</div><div class="stat-value">-</div></div>
          <div class="stat-card"><div class="stat-label">평균 불안</div><div class="stat-value">-</div></div>
        `;
        return;
      }

      const avgSleep = entries.reduce((a,e) => a + calcSleepHours(e), 0) / entries.length;
      const avgTantrum = entries.reduce((a,e) => a + formatNum(e.tantrumCount), 0) / entries.length;
      const avgChin = entries.reduce((a,e) => a + formatNum(e.chinCount), 0) / entries.length;
      const avgAnxiety = entries.reduce((a,e) => a + formatNum(e.anxietyCount), 0) / entries.length;

      $('statsBox').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">평균 수면</div>
          <div class="stat-value">${avgSleep.toFixed(1)}시간</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">평균 텐트럼</div>
          <div class="stat-value">${avgTantrum.toFixed(1)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">평균 턱 행동</div>
          <div class="stat-value">${avgChin.toFixed(1)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">평균 불안</div>
          <div class="stat-value">${avgAnxiety.toFixed(1)}</div>
        </div>
      `;
    }

    function render(){
      const entries = loadEntries();
      renderTodayRecords(entries);
      renderAllRecords(entries);
      renderStats(entries);
    }

    $('saveBtn').addEventListener('click', () => {
      try{
        const entry = getFormData();

        if (!entry.date){
          showStatus('날짜를 입력해 주세요.', true);
          return;
        }

        let entries = loadEntries();
        const idx = entries.findIndex(e => e.date === entry.date && e.segment === entry.segment);

        // 같은 날짜 + 같은 구간의 첫 기록은 보존
        if (idx >= 0 && editingKey === null){
          showStatus('이미 오늘 이 구간의 기록이 있습니다. 수정 버튼을 눌러 이어서 수정해 주세요.', true);
          return;
        }

        // 수정 모드일 때만 덮어쓰기 허용
        if (editingKey !== null){
          const targetIndex = entries.findIndex(e => makeEntryKey(e) === editingKey);

          if (targetIndex >= 0){
            entries[targetIndex] = {
              ...entry,
              updatedAt: new Date().toLocaleString('ko-KR')
            };
          } else {
            showStatus('수정할 기존 기록을 찾지 못했습니다. 다시 수정 버튼을 눌러 주세요.', true);
            return;
          }
        } else {
          entries.push({
            ...entry,
            updatedAt: new Date().toLocaleString('ko-KR')
          });
        }

        saveEntries(entries);

        if (typeof window.saveLogToCloud === 'function'){
          try{
            window.saveLogToCloud(entry);
          }catch(e){
            console.log('클라우드 저장 오류', e);
          }
        }

        const msg = editingKey ? '수정 저장되었습니다.' : '저장되었습니다.';
        resetForm();
        render();
        showStatus(msg + ' 오늘 기록 카드에서 확인해 주세요.');
      }catch(error){
        showStatus('저장 중 오류가 생겼습니다: ' + error.message, true);
      }
    });

    window.loadEntryToForm = loadEntryToForm;
    window.deleteEntry = deleteEntry;

    function downloadJson(){
      const blob = new Blob([JSON.stringify(loadEntries(), null, 2)], { type:'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'dear-siel-records.json';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function init(){
      initChoices();
      resetForm();
      render();
    }

    init();
  </script>
</body>
</html>
