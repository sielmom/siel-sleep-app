<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dear Siel</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#ffffff">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  background:#f5f7fb;
  margin:0;
  padding:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}
button{
  padding:12px;
  border-radius:12px;
  border:none;
  background:#2563eb;
  color:white;
  font-size:16px;
  width:100%;
  margin-top:10px;
}
input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
</style>
</head>
<body>

<h1>💌 Dear Siel</h1>

<div class="card">
<h3>오늘 기록</h3>

<label>날짜</label>
<input type="date" id="date">

<label>기록자</label>
<select id="writer">
<option value="엄마">엄마</option>
<option value="아빠">아빠</option>
</select>

<label>수면시간(시간)</label>
<input type="number" id="sleep">

<label>턱 행동 (0~10)</label>
<input type="range" id="chin" min="0" max="10" value="0">
<span id="chinVal">0</span>

<label>텐트럼 (0~10)</label>
<input type="range" id="tantrum" min="0" max="10" value="0">
<span id="tantrumVal">0</span>

<label>불안 (0~10)</label>
<input type="range" id="anxiety" min="0" max="10" value="0">
<span id="anxietyVal">0</span>

<label>순응도 (0~10)</label>
<input type="range" id="compliance" min="0" max="10" value="0">
<span id="complianceVal">0</span>

<label>오늘 시엘에게 한 줄 편지</label>
<textarea id="letter"></textarea>

<button onclick="saveData()">저장</button>
<button onclick="deleteData()" style="background:#dc2626;">오늘 기록 삭제</button>
</div>

<div class="card">
<h3>그래프</h3>
<canvas id="chart"></canvas>
</div>

<script>
const STORAGE_KEY = "dear_siel_data";
const today = new Date().toISOString().slice(0,10);
document.getElementById("date").value = today;

["chin","tantrum","anxiety","compliance"].forEach(id=>{
  const el = document.getElementById(id);
  const val = document.getElementById(id+"Val");
  el.oninput = ()=> val.innerText = el.value;
});

function loadAll(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}

function saveAll(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function saveData(){
  let data = loadAll();
  const date = document.getElementById("date").value;

  const entry = {
    date: date,
    writer: document.getElementById("writer").value,
    sleep: document.getElementById("sleep").value,
    chin: document.getElementById("chin").value,
    tantrum: document.getElementById("tantrum").value,
    anxiety: document.getElementById("anxiety").value,
    compliance: document.getElementById("compliance").value,
    letter: document.getElementById("letter").value
  };

  const index = data.findIndex(d=>d.date===date);

  if(index >= 0){
    data[index] = entry; // 수정
  }else{
    data.push(entry); // 새 기록
  }

  saveAll(data);
  drawChart();
  alert("저장되었습니다");
}

function deleteData(){
  let data = loadAll();
  const date = document.getElementById("date").value;
  data = data.filter(d=>d.date!==date);
  saveAll(data);
  drawChart();
  alert("삭제되었습니다");
}

function drawChart(){
  const data = loadAll();
  const labels = data.map(d=>d.date);
  const chin = data.map(d=>d.chin);

  const ctx = document.getElementById("chart");

  if(window.chart) window.chart.destroy();

  window.chart = new Chart(ctx,{
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        label:'턱 행동',
        data:chin,
        borderColor:'blue'
      }]
    }
  });
}

drawChart();
</script>

</body>
</html>
